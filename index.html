<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f2744" />
    <meta name="description" content="Wyniki i składy — Olimpiada Bieździadów 2026" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Olimpiada 2026" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Olimpiada Bieździadów 2026</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="top-bar-inner">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">🏅</span>
            <div class="brand-text">
              <span class="brand-title">Olimpiada 2026</span>
              <span class="brand-sub">Bieździadów</span>
            </div>
          </div>
          <div class="top-actions">
            <button
              type="button"
              id="btn-options"
              class="btn btn-icon"
              title="Opcje"
              aria-label="Opcje"
              aria-haspopup="dialog"
              aria-expanded="false"
              aria-controls="options-modal"
            >
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 2h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.59.24-1.13.55-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.48a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.4.31.63.22l2.39-.96c.5.39 1.04.7 1.63.94l.36 2.54c.05.24.25.42.49.42h3.8c.24 0 .44-.18.49-.42l.36-2.54c.59-.24 1.13-.55 1.63-.94l2.39.96c.23.09.5 0 .63-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"
                />
              </svg>
            </button>
            <span id="status-line" class="status-line" aria-live="polite"></span>
            <button type="button" id="btn-refresh" class="btn btn-icon" title="Odśwież dane" aria-label="Odśwież dane">
              <svg class="icon-refresh" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4V1L7 6l5 5V7c2.76 0 5 2.24 5 5a5 5 0 0 1-8.9 3.1l-1.46 1.46A7 7 0 0 0 19 12c0-1.93-.78-3.68-2.05-4.95zM6 12c0-1.48.51-2.84 1.35-3.9l1.46 1.46A4.96 4.96 0 0 0 7 12a5 5 0 0 0 8.9 3.1l1.46 1.46A7 7 0 0 1 5 12c0-1.93.78-3.68 2.05-4.95L6 6V1l-5 5 5 5V6.35z"/>
              </svg>
            </button>
          </div>
        </div>
        <nav id="main-nav" class="main-nav" role="tablist" aria-label="Dyscypliny"></nav>
      </header>

      <main id="content" class="content" role="main"></main>

    </div>

    <!-- Options popup -->
    <div id="options-modal" class="options-modal" hidden role="dialog" aria-modal="true" aria-labelledby="options-title">
      <div class="options-backdrop" data-options-close></div>
      <div class="options-panel">
        <button type="button" class="options-close" data-options-close aria-label="Zamknij opcje">×</button>
        <div id="options-body" class="options-body"></div>
      </div>
    </div>

    <!-- Gold medal celebration root (filled by JS) -->
    <div id="celebration-root"></div>

    <script type="module" src="./js/sw-register.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
